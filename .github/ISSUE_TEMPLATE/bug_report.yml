name: Bug report
description: Report reproducible behavior that does not work as intended
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Worklings. Do not include prompts, source code, private pet-state contents, or other sensitive data.
  - type: input
    id: version
    attributes:
      label: Worklings version or commit
      description: Include the release version or commit hash when possible.
      placeholder: 0.1.0-alpha.1 or abc1234
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS and hardware
      placeholder: macOS 15.5 on Apple M2
    validations:
      required: true
  - type: dropdown
    id: installation
    attributes:
      label: Installation method
      options:
        - swift run Worklings
        - GitHub Release DMG
        - Locally built app bundle
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable sequence that shows the problem.
      placeholder: |
        1. Launch Worklings
        2. ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Additional context
      description: Add sanitized logs, screenshots, display setup, Reduce Motion state, or other relevant details.
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: I removed private or sensitive information from this report.
          required: true
