    <script>
      window.__timelines = window.__timelines || {};

      const tl = gsap.timeline({ paused: true });
      const PULSE = 0.19;
      const BEATS = [PULSE, PULSE * 5, PULSE * 9];
      const camera = document.getElementById("f03-bond-train-evolve-camera");
      const phase = { scale: 0.96 };
      const drift = { p: 0 };

      tl.fromTo(
        "#f03-bond-train-evolve-word-bond",
        { scale: 1.48, filter: "blur(16px)", opacity: 0 },
        { scale: 1, filter: "blur(0px)", opacity: 1, duration: 0.48, ease: "power4.out" },
        BEATS[0],
      );

      tl.fromTo(
        "#f03-bond-train-evolve-word-train",
        { x: -360, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.42, ease: "expo.out" },
        BEATS[1],
      );

      tl.fromTo(
        "#f03-bond-train-evolve-word-evolve",
        { y: 94, rotation: 5, opacity: 0 },
        { y: 0, rotation: 0, opacity: 1, duration: 0.5, ease: "circ.out" },
        BEATS[2],
      );

      const swapPose = (softSelector, readySelector, trigger) => {
        const exitDuration = 0.28;
        const overlap = 0.12;
        tl.to(
          softSelector,
          { scale: 0.68, opacity: 0, filter: "blur(5px)", duration: exitDuration, ease: "power2.in" },
          trigger,
        );
        tl.to(
          readySelector,
          { scale: 1, opacity: 1, duration: 0.42, ease: "back.out(1.7)" },
          trigger + exitDuration - overlap,
        );
      };

      swapPose(
        "#f03-bond-train-evolve-wildkin-soft",
        "#f03-bond-train-evolve-wildkin-ready",
        BEATS[1],
      );
      swapPose(
        "#f03-bond-train-evolve-elemental-soft",
        "#f03-bond-train-evolve-elemental-ready",
        BEATS[1] + 0.12,
      );
      swapPose(
        "#f03-bond-train-evolve-relicborn-soft",
        "#f03-bond-train-evolve-relicborn-ready",
        BEATS[2],
      );

      const ticks = gsap.utils.toArray("#root .metronome i");
      ticks.forEach((tick, index) => {
        tl.fromTo(
          tick,
          { opacity: 0.22, scaleY: 0.45 },
          {
            opacity: 1,
            scaleY: 1,
            duration: 0.09,
            ease: "power2.out",
            yoyo: true,
            repeat: 1,
          },
          PULSE * (index + 1),
        );
      });

      tl.fromTo(
        "#f03-bond-train-evolve-rail-fill",
        { scaleX: 0 },
        { scaleX: 1, duration: 0.68, ease: "power4.out" },
        2.12,
      );

      tl.to(
        "#f03-bond-train-evolve-stack",
        { x: 18, duration: 0.16, ease: "power4.out" },
        2.12,
      );
      tl.to(
        "#f03-bond-train-evolve-stack",
        { x: 0, duration: 0.34, ease: "back.out(1.5)" },
        2.28,
      );

      tl.to(
        phase,
        { scale: 1, duration: 0.82, ease: "power2.out" },
        0.25,
      );
      tl.to(
        phase,
        { scale: 1.055, duration: 1, ease: "power3.out" },
        1.84,
      );
      tl.to(
        drift,
        {
          p: Math.PI * 2 * 1.25,
          duration: 3,
          ease: "none",
          onUpdate: () => {
            const dx = Math.sin(drift.p) * 4;
            const dy = Math.sin(drift.p * 1.31) * 2;
            camera.style.transform = `scale(${phase.scale}) translate(${dx}px, ${dy}px)`;
          },
        },
        0,
      );

      window.__timelines["03-bond-train-evolve"] = tl;
    </script>
